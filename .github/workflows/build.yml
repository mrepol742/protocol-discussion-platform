name: Build CI

on:
  push:
    branches: [ "master" ]
  pull_request_target:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  client-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build


  server-build:
    needs: client-build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: protocol_discussion_platform
          MYSQL_USER: protocol_discussion_platform
          MYSQL_PASSWORD: secret_password_of_root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, bcmath, pdo_mysql
        coverage: none

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Create Typesense data folder
      run: mkdir -p ${{ github.workspace }}/typesense-data

    - name: Start Typesense
      run: |
        docker run -d -p 8108:8108 \
          -v ${{ github.workspace }}/typesense-data:/data \
          -e TYPESENSE_API_KEY=very_secured_secret_api_key \
          typesense/typesense:0.26.0.rc70 \
          --data-dir /data --enable-cors

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Wait for MySQL
      run: |
        until mysql -h 127.0.0.1 -u protocol_discussion_platform -psecret_password_of_root -e 'select 1'; do
          sleep 1
        done

    - name: Wait for Typesense
      run: |
        for i in $(seq 1 60); do
        if curl -sS http://localhost:8108/health | grep -q '"ok":true'; then
        echo "Typesense is healthy"
        exit 0
        fi
        sleep 2
        done
        echo "Typesense did not become healthy in time"
        docker ps -a
        docker logs $(docker ps -aq --filter ancestor=typesense/typesense:0.26.0.rc70) || true
        exit 1

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Copy .env
      run: cp .env.example .env

    - name: Configure environment variables
      run: |
        echo "DB_CONNECTION=mysql" >> .env
        echo "DB_HOST=127.0.0.1" >> .env
        echo "DB_PORT=3306" >> .env
        echo "DB_DATABASE=protocol_discussion_platform" >> .env
        echo "DB_USERNAME=protocol_discussion_platform" >> .env
        echo "DB_PASSWORD=secret_password_of_root" >> .env

        echo "SCOUT_DRIVER=typesense" >> .env

        echo "TYPESENSE_HOST=localhost" >> .env
        echo "TYPESENSE_PORT=8108" >> .env
        echo "TYPESENSE_PROTOCOL=http" >> .env
        echo "TYPESENSE_API_KEY=very_secured_secret_api_key" >> .env

        php artisan key:generate

    - name: Run migrations
      run: php artisan migrate:fresh --seed --force

    - name: Install dependencies for client
      run: npm ci

    - name: Build project
      run: npm run build

    # Add a test script to composer.json, for instance: "test": "vendor/bin/phpunit"
    # Docs: https://getcomposer.org/doc/articles/scripts.md

    - name: Run test suite
      run: php artisan test
